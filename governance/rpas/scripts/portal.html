<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RPAS-CM Live Governance Portal</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #0d1117; color: #c9d1d9; margin: 0; padding: 40px; }
        .card { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 24px; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .title { font-size: 24px; font-weight: bold; color: #58a6ff; margin-bottom: 16px; border-bottom: 1px solid #30363d; padding-bottom: 10px; }
        .badge { display: inline-block; padding: 4px 8px; border-radius: 12px; font-size: 12px; font-weight: bold; text-transform: uppercase; color: #fff; }
        .badge.success { background-color: #238636; }
        .badge.danger { background-color: #da3633; }
        pre { background: #010409; padding: 16px; border-radius: 6px; overflow-x: auto; color: #8b949e; border: 1px solid #30363d; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        function GovernancePortal() {
            const [status, setStatus] = React.useState(null);
            const [error, setError] = React.useState(null);

            React.useEffect(() => {
                fetch('./status.json')
                    .then(res => res.json())
                    .then(data => setStatus(data))
                    .catch(err => setError(err.toString()));
            }, []);

            if (error) return <div className="card"><div className="title" style={{color: '#da3633'}}>Error Loading Ledger</div><p>{error}</p></div>;
            if (!status) return <div>Loading Governance Ledger...</div>;

            return (
                <div style={{ maxWidth: '900px', margin: '0 auto' }}>
                    <div className="card">
                        <div className="title">🛡️ RPAS-CM Active Certification</div>
                        <p><strong>Artifact ID:</strong> {status.csrInfo.id} (v{status.csrInfo.version})</p>
                        <p><strong>Certification Date:</strong> {status.csrInfo.certificationDate}</p>
                        <p>
                            <strong>Integrity State: </strong>
                            <span className={`badge ${status.governanceBaseline ? 'success' : 'danger'}`}>
                                {status.governanceBaseline ? 'VERIFIED' : 'TAMPERED'}
                            </span>
                        </p>
                    </div>
                    <div className="card">
                        <div className="title">⚙️ Ledger Metadata (Raw JSON)</div>
                        <pre>{JSON.stringify(status, null, 2)}</pre>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<GovernancePortal />);
    </script>
</body>
</html>
